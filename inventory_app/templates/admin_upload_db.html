{% extends 'base.html' %}
{% block page_title %}Upload Database{% endblock %}

{% block content %}
<div class="container-fluid py-4" style="max-width:480px">
  <h4 class="mb-4"><i class="bi bi-cloud-upload me-2"></i>Upload Database</h4>
  <div class="alert alert-warning">
    <i class="bi bi-exclamation-triangle me-1"></i>
    การ upload จะ <strong>แทนที่ database ทั้งหมด</strong> บนเซิร์ฟเวอร์ทันที
  </div>
  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">เลือกไฟล์ .db</label>
      <input type="file" name="db_file" accept=".db" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-danger w-100">
      <i class="bi bi-cloud-upload me-1"></i>Upload และแทนที่ Database
    </button>
  </form>
</div>
{% endblock %}
